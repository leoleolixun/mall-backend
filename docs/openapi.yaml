components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProductID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 商品 ID
    ProductPathID:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 商品 ID
    MerchantID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 商户 ID
    CategoryID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 分类 ID
    AddressID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 收货地址 ID
    SKUID:
      name: sku_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: SKU ID
    OrderID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 订单 ID
    CouponID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 优惠券 ID
    PaymentNo:
      name: payment_no
      in: path
      required: true
      schema:
        type: string
      description: 支付单号
    AfterSaleID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 售后申请 ID

  responses:
    SuccessEmpty:
      description: 操作成功
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    BadRequest:
      description: 参数错误或业务校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40000
            message: 参数错误
    Unauthorized:
      description: 未登录或 token 无效
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 401
            message: 未登录
    InternalError:
      description: 服务内部错误
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 50000
            message: 服务内部错误

  schemas:
    SuccessResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 40000
        message:
          type: string
          example: 参数错误

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        mysql:
          type: string
          example: ok
        redis:
          type: string
          example: ok

    Category:
      type: object
      required:
        - id
        - name
        - sort
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 手机数码
        sort:
          type: integer
          example: 100

    ProductListItem:
      type: object
      required:
        - id
        - merchant_id
        - category_id
        - name
        - cover
        - min_price
      properties:
        id:
          type: integer
          format: int64
          example: 1
        merchant_id:
          type: integer
          format: int64
          example: 1
        category_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: iPhone 15
        cover:
          type: string
          example: https://example.com/iphone.jpg
        min_price:
          type: integer
          format: int64
          description: 最低 SKU 价格，单位分
          example: 599900

    ProductPage:
      type: object
      required:
        - list
        - page
        - page_size
        - total
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/ProductListItem"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 1

    ProductDetail:
      type: object
      required:
        - id
        - merchant_id
        - category_id
        - name
        - cover
        - description
        - skus
      properties:
        id:
          type: integer
          format: int64
          example: 1
        merchant_id:
          type: integer
          format: int64
          example: 1
        category_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: iPhone 15
        cover:
          type: string
          example: https://example.com/iphone.jpg
        description:
          type: string
          example: 商品详情描述
        skus:
          type: array
          items:
            $ref: "#/components/schemas/SKU"

    SKU:
      type: object
      required:
        - id
        - name
        - image
        - price
        - stock
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: 黑色 128G
        image:
          type: string
          example: https://example.com/sku.jpg
        price:
          type: integer
          format: int64
          description: 价格，单位分
          example: 599900
        stock:
          type: integer
          example: 100

    ProductStatus:
      type: integer
      description: |
        商品状态：
        0 草稿
        1 上架
        2 下架
      enum:
        - 0
        - 1
        - 2
      example: 1

    MerchantCategoryRequest:
      type: object
      required:
        - name
      properties:
        parent_id:
          type: integer
          format: int64
          description: 父级分类 ID，一级分类为 0
          example: 0
        name:
          type: string
          example: 手机数码
        sort:
          type: integer
          example: 100
        status:
          type: integer
          description: 0 禁用，1 启用
          enum:
            - 0
            - 1
          example: 1

    MerchantCategory:
      allOf:
        - type: object
          required:
            - id
            - merchant_id
          properties:
            id:
              type: integer
              format: int64
              example: 1
            merchant_id:
              type: integer
              format: int64
              example: 1
        - $ref: "#/components/schemas/MerchantCategoryRequest"

    MerchantProductRequest:
      type: object
      required:
        - category_id
        - name
      properties:
        category_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: iPhone 15
        cover:
          type: string
          example: https://example.com/iphone.jpg
