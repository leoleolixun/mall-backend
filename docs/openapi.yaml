            skus:
              type: array
              items:
                $ref: "#/components/schemas/MerchantSKU"
            created_at:
              type: string
              format: date-time
              example: "2026-07-06T09:30:00+08:00"
            updated_at:
              type: string
              format: date-time
              example: "2026-07-06T09:30:00+08:00"
        - $ref: "#/components/schemas/MerchantProductRequest"

    MerchantProductPage:
      type: object
      required:
        - list
        - page
        - page_size
        - total
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/MerchantProduct"
        page:
