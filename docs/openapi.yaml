          format: int64
          description: 应付金额，单位分
          example: 1199800
        user_coupon_id:
          type: integer
          format: int64
          description: 实际核销的用户优惠券 ID，0 表示未使用
          example: 0
        remark:
          type: string
          example: 请工作日配送
        paid_at:
          type: string
          format: date-time
          nullable: true
          example: "2026-07-06T10:00:00+08:00"
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          example: null
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        shipment:
          allOf:
            - $ref: "#/components/schemas/Shipment"
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        created_at:
          type: string
          format: date-time
          example: "2026-07-06T09:30:00+08:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-06T09:30:00+08:00"

    OrderItem:
      type: object
      required:
        - id
        - product_id
        - sku_id
        - product_name
        - sku_name
        - sku_image
        - price
        - quantity
        - subtotal
        - discount_amount
        - payable_amount
      properties:
        id:
          type: integer
          format: int64
          example: 1
        product_id:
          type: integer
          format: int64
          example: 1
        sku_id:
          type: integer
          format: int64
          example: 1
        product_name:
          type: string
          example: iPhone 15
        sku_name:
          type: string
          example: 黑色 128G
        sku_image:
          type: string
          example: https://example.com/sku.jpg
        price:
          type: integer
          format: int64
          description: 下单时 SKU 单价，单位分
          example: 599900
        quantity:
          type: integer
          example: 2
        subtotal:
          type: integer
          format: int64
          description: 小计金额，单位分
          example: 1199800
        discount_amount:
          type: integer
          format: int64
          description: 当前订单明细承担的优惠金额快照，单位分
          minimum: 0
          example: 10000
        payable_amount:
          type: integer
          format: int64
          description: 当前订单明细优惠后的商品实付金额快照，单位分
          minimum: 0
          example: 1189800

    AfterSaleType:
      type: string
      description: 售后类型
      enum:
        - refund_only
        - return_refund
      example: refund_only

    AfterSaleStatus:
      type: integer
      description: |
        售后状态：
        1 待审核
        2 退款处理中
        3 退款成功
        4 商家已拒绝
        5 用户已取消
        6 退款失败
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
      example: 1

    CreateAfterSaleRequest:
      type: object
      required:
        - order_id
        - order_item_id
        - type
        - reason
      properties:
        order_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        order_item_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        type:
          $ref: "#/components/schemas/AfterSaleType"
        reason:
          type: string
          example: 商品不想要了
        description:
          type: string
          maxLength: 500
        images:
          type: array
          items:
            type: string
          example:
            - https://example.com/proof.jpg

    RejectAfterSaleRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          example: 商品已影响二次销售

    AfterSale:
      type: object
      required:
        - id
        - after_sale_no
        - order_no
        - order_id
        - order_item_id
        - product_name
        - sku_name
        - sku_image
        - user_id
        - merchant_id
        - type
        - type_text
        - status
        - status_text
        - reason
        - description
        - images
        - refund_amount
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
          example: 1
        after_sale_no:
          type: string
        order_no:
          type: string
        order_id:
          type: integer
          format: int64
          example: 1
        order_item_id:
          type: integer
          format: int64
          example: 1
        user_id:
          type: integer
          format: int64
          example: 1
        merchant_id:
          type: integer
          format: int64
          example: 1
        type:
          $ref: "#/components/schemas/AfterSaleType"
        type_text:
          type: string
          example: 仅退款
        status:
          $ref: "#/components/schemas/AfterSaleStatus"
        status_text:
          type: string
          example: 待商家审核
        reason:
          type: string
          example: 商品不想要了
        description:
          type: string
        product_name:
          type: string
        sku_name:
          type: string
        sku_image:
          type: string
        reject_reason:
          type: string
          nullable: true
          example: null
        refund_amount:
          type: integer
          format: int64
          description: 退款金额，单位分
          example: 599900
        images:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
          example: "2026-07-06T09:30:00+08:00"
        updated_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        refunded_at:
          type: string
          format: date-time
          nullable: true
        refund:
          $ref: "#/components/schemas/Refund"

    Refund:
      type: object
      properties:
        trade_id:
          type: integer
          format: int64
          description: 原支付所属交易 ID
        payment_allocation_id:
          type: integer
          format: int64
          description: 本次退款冲减的子订单支付分配 ID
        refund_no:
          type: string
        pay_channel:
          type: string
        amount:
          type: integer
          format: int64
        status:
          type: integer
          enum: [1, 2, 3, 4]
          description: 1 处理中，2 成功，3 明确失败，4 渠道结果未知、等待主动查询
        status_text:
          type: string
        transaction_id:
          type: string
        failure_reason:
          type: string
          description: 只有明确失败时填写
        last_error:
          type: string
          description: 结果未知时记录最近一次渠道错误或状态说明
        retry_count:
          type: integer
          description: 进入待确认状态并安排对账的次数
        last_attempt_at:
          type: string
          format: date-time
          nullable: true
        next_retry_at:
          type: string
          format: date-time
          nullable: true
        refunded_at:
          type: string
          format: date-time
          nullable: true

    AfterSalePage:
      type: object
      required:
        - list
        - page
        - page_size
        - total
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/AfterSale"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 1

    UploadImage:
      type: object
      required:
        - url
        - key
        - filename
        - content_type
        - size
        - provider
