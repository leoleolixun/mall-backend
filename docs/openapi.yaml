    ProductDetail:
      type: object
      required:
        - id
        - merchant_id
        - merchant_name
        - merchant_logo
        - category_id
        - name
        - cover
        - description
        - skus
      properties:
        id:
          type: integer
          format: int64
          example: 1
        merchant_id:
          type: integer
          format: int64
          example: 1
        merchant_name:
          type: string
          example: go-mall 自营店
        merchant_logo:
          type: string
          example: https://example.com/merchant-logo.jpg
        category_id:
