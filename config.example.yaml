app:
  # 开发环境可以打开；连接远程或线上 MySQL 时建议保持 false。
  auto_migrate: false
  seed_data: false

order:
  # 首次部署保持 false，确认支付宝配置和任务日志正常后再开启。
  cancel_expired_enabled: false
  # 待支付订单超过该时间后可由超时取消任务处理。
  pending_payment_timeout_minutes: 15
  # 每次任务最多处理的订单数，最大限制为 1000。
  cancel_batch_size: 100
  # 发货超过指定天数后自动确认收货，由 complete-shipped-orders 定时任务处理。
  auto_complete_enabled: false
  shipped_auto_complete_days: 10
  complete_batch_size: 100

settlement:
  # 结算命令总开关。首次部署先保持 false，完成 M8 migration 和对账后再开启。
  enabled: false
  # 子订单完成后继续保留的售后观察期；到期后销售和冲正流水才可进入结算单。
  hold_days: 7
  # 单次补记结算流水最多扫描的已完成订单数，最大 1000。
  batch_size: 100

server:
  port: 8080
  # 线上必须使用 release；systemd 中的 GIN_MODE 会覆盖这里。
  mode: debug
  # 仅信任同机 Nginx 转发的客户端 IP 头，禁止保留 Gin 的默认全代理信任。
  trusted_proxies:
    - 127.0.0.1
    - ::1
  # 同域部署可保持空数组；跨域部署时只填写完整的正式前端来源，不允许使用 *。
  cors_allowed_origins: []

mysql:
  host: 127.0.0.1
  port: 3306
  user: mall_dev_user
  password: your_password
  database: mall_dev
  charset: utf8mb4
  parse_time: true
  loc: Local

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

log:
  level: debug
  # 生产环境必须使用 json，便于按 request_id、user_id 和 merchant_id 检索。
  format: json

jwt:
  # 两个密钥都必须至少 32 字节，并且不能相同或继续使用示例值。
  access_secret: change_me
  access_ttl_minutes: 120
  refresh_ttl_hours: 168
  # 商家后台使用独立签名密钥，避免买家 token 与商家 token 混用。
  merchant_access_secret: change_me_to_another_secret
  merchant_access_ttl_minutes: 120
  merchant_refresh_ttl_hours: 168

auth:
  # 仅允许 debug 环境本地联调。该接口信任客户端 open_id，不能在生产环境开放。
  # 正式小程序接入后应保持 false，改用 wx.login code -> 服务端 code2session。
  unsafe_wechat_open_id_login_enabled: false
  # 按客户端 IP 限制认证入口，用户名维度的连续失败限制仍会同时生效。
  login_rate_limit_per_minute: 20
  refresh_rate_limit_per_minute: 60

observability:
  # 指标仅监听在后端端口；Nginx 不应将 /metrics 暴露到公网。
  metrics_enabled: true

storage:
  # 留空表示暂不启用；可选 cos（腾讯云 COS）或 qiniu（七牛 Kodo）。
  provider: ""
  # 图片上传大小上限，单位 MB。
  max_image_size_mb: 10
  # 对象键前缀，最终路径类似 go-mall/avatar/2026/07/uuid.jpg。
  path_prefix: "go-mall"
  # 图片对外访问域名。可以填写对象存储默认域名或绑定的 CDN 自定义域名。
  public_base_url: "https://images.example.com"

  cos:
    # 腾讯云存储桶 URL，格式为 https://<BucketName-APPID>.cos.<Region>.myqcloud.com
    bucket_url: "https://example-1250000000.cos.ap-guangzhou.myqcloud.com"
    # 从腾讯云访问管理获取。真实密钥只放在服务器 config.yaml，不要提交到 Git。
    secret_id: ""
    secret_key: ""

  qiniu:
    # 七牛对象存储空间名称和密钥。
    bucket: ""
    access_key: ""
    secret_key: ""

payment:
  # 仅用于本地开发和自动化测试。生产环境必须保持 false。
  mock_enabled: false
  refund:
    # 退款结果未知时由 reconcile-refunds 定时任务主动查询支付宝。
    reconcile_enabled: false
    # 查询失败或结果仍未知时，等待多少分钟后再次对账。
    retry_interval_minutes: 5
    # 每次任务最多处理的退款单数，最大限制为 1000。
    reconcile_batch_size: 100
  alipay:
    # true 表示启用支付宝真实支付；false 时 alipay 支付会直接返回配置错误。
    enabled: false
    # 沙箱环境填 true；正式线上环境填 false。
    sandbox: true
    app_id: "your_alipay_app_id"

    # 推荐使用文件路径，不要把真实私钥提交到代码仓库。
    app_private_key_path: "configs/alipay/app_private_key.pem"
    # 也支持直接写入完整私钥内容，生产环境不推荐。
    app_private_key: ""

    # 普通公钥模式：配置支付宝公钥。证书模式和普通公钥模式二选一。
    alipay_public_key_path: "configs/alipay/alipay_public_key.pem"
    alipay_public_key: ""

    # 证书模式：如果启用证书模式，需要同时配置下面三个路径，并清空普通支付宝公钥配置。
    app_cert_public_key_path: ""
    alipay_root_cert_path: ""
    alipay_cert_public_key_path: ""

    # 必须是公网可访问的 HTTPS 地址，支付宝支付成功后会 POST 回调这里。
    notify_url: "https://api.example.com/api/v1/payments/alipay/notify"

    page:
      # PC 网页支付，当前优先接入这个。
      enabled: true
      return_url: "https://www.example.com/payment/result"
      product_code: "FAST_INSTANT_TRADE_PAY"
      timeout_express: "15m"

    wap:
      # H5 支付预留。你后续签约并联调 H5 时再打开。
      enabled: false
      return_url: "https://m.example.com/payment/result"
      quit_url: "https://m.example.com/cart"
      product_code: "QUICK_WAP_WAY"
      timeout_express: "15m"
