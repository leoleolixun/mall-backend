components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    merchantBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Merchant JWT

  parameters:
    ProductID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 商品 ID
    ProductPathID:
      name: product_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 商品 ID
    MerchantID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 商户 ID
    CategoryID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 分类 ID
    AddressID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 收货地址 ID
    SKUID:
      name: sku_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: SKU ID
    OrderID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 订单 ID
    TradeID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 交易 ID
    CouponID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 优惠券 ID
    PaymentNo:
      name: payment_no
      in: path
      required: true
      schema:
        type: string
      description: 支付单号
    AfterSaleID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 售后申请 ID

  responses:
    SuccessEmpty:
      description: 操作成功
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/SuccessResponse"
    BadRequest:
      description: 参数错误或业务校验失败
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40000
            message: 参数错误
    Unauthorized:
      description: 未登录或 token 无效
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 401
            message: 未登录
    Forbidden:
      description: 当前商家角色没有接口权限
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40300
            message: 当前角色无权执行此操作
    NotFound:
      description: 资源不存在或当前不可公开访问
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40400
            message: 资源不存在
    Conflict:
      description: 幂等请求正在处理、预览已失效或资源状态冲突
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 40900
            message: 请重新预览交易
    InternalError:
      description: 服务内部错误
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 50000
            message: 服务内部错误

    TooManyRequests:
      description: 认证接口按客户端 IP 限流
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
        Retry-After:
          description: 建议等待秒数
          schema:
            type: integer
        X-RateLimit-Limit:
          description: 当前时间窗口允许的请求数
          schema:
            type: integer
        X-RateLimit-Remaining:
          description: 当前时间窗口剩余请求数
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 42900
            message: 请求过于频繁，请稍后再试

    RateLimitUnavailable:
      description: Redis 不可用，认证限流暂时无法执行
      headers:
        X-Request-ID:
          $ref: "#/components/headers/RequestID"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 50000
            message: 认证限流服务暂不可用

  headers:
    RequestID:
      description: 当前请求的 UUID，可用于关联服务端结构化日志
      schema:
        type: string
        format: uuid

  schemas:
    SuccessResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: ok
        data:
          nullable: true

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 40000
        message:
          type: string
          example: 参数错误

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        mysql:
          type: string
          example: ok
        redis:
          type: string
          example: ok

    Category:
      type: object
      required:
        - id
        - merchant_id
        - parent_id
        - name
        - sort
      properties:
        id:
          type: integer
          format: int64
          example: 1
        merchant_id:
          type: integer
          format: int64
          example: 1
        parent_id:
          type: integer
          format: int64
          description: 顶级分类为 0
          example: 0
        name:
          type: string
          example: 手机数码
        sort:
          type: integer
          example: 100

    ProductListItem:
      type: object
      required:
        - id
        - merchant_id
        - merchant_name
        - merchant_logo
        - category_id
        - name
        - cover
        - min_price
      properties:
        id:
          type: integer
          format: int64
          example: 1
        merchant_id:
          type: integer
          format: int64
          example: 1
        merchant_name:
          type: string
          example: go-mall 自营店
        merchant_logo:
          type: string
          example: https://example.com/merchant-logo.jpg
        category_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: iPhone 15
        cover:
          type: string
          example: https://example.com/iphone.jpg
        min_price:
          type: integer
          format: int64
          description: 最低 SKU 价格，单位分
          example: 599900

    ProductPage:
      type: object
      required:
        - list
        - page
        - page_size
        - total
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/ProductListItem"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
