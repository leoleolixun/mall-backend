          nullable: true
          example: "2026-07-06T10:00:00+08:00"
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          example: null
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        created_at:
          type: string
          format: date-time
          example: "2026-07-06T09:30:00+08:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-07-06T09:30:00+08:00"

    OrderItem:
      type: object
      required:
        - id
        - product_id
        - sku_id
        - product_name
        - sku_name
        - sku_image
        - price
        - quantity
        - subtotal
      properties:
        id:
          type: integer
          format: int64
          example: 1
        product_id:
          type: integer
          format: int64
          example: 1
        sku_id:
          type: integer
          format: int64
          example: 1
        product_name:
          type: string
          example: iPhone 15
        sku_name:
          type: string
          example: 黑色 128G
        sku_image:
          type: string
          example: https://example.com/sku.jpg
        price:
          type: integer
          format: int64
          description: 下单时 SKU 单价，单位分
          example: 599900
        quantity:
          type: integer
          example: 2
        subtotal:
          type: integer
          format: int64
          description: 小计金额，单位分
          example: 1199800

    AfterSaleType:
      type: string
      description: 售后类型
      enum:
        - refund_only
        - return_refund
      example: refund_only

    AfterSaleStatus:
      type: integer
      description: |
        售后状态：
        1 待审核
        2 已同意
        3 已拒绝
        4 已取消
        5 已退款
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
      example: 1

    CreateAfterSaleRequest:
      type: object
      required:
        - order_id
        - order_item_id
        - type
        - reason
      properties:
        order_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        order_item_id:
          type: integer
          format: int64
          minimum: 1
          example: 1
        type:
          $ref: "#/components/schemas/AfterSaleType"
        reason:
          type: string
          example: 商品不想要了
        images:
          type: array
          items:
            type: string
          example:
            - https://example.com/proof.jpg

    RejectAfterSaleRequest:
      type: object
      required:
        - reject_reason
      properties:
        reject_reason:
          type: string
          example: 商品已影响二次销售

    AfterSale:
      type: object
      required:
        - id
        - order_id
        - order_item_id
        - type
        - status
        - reason
        - refund_amount
        - created_at
      properties:
        id:
          type: integer
          format: int64
          example: 1
        order_id:
          type: integer
          format: int64
          example: 1
        order_item_id:
          type: integer
          format: int64
          example: 1
        type:
          $ref: "#/components/schemas/AfterSaleType"
        status:
          $ref: "#/components/schemas/AfterSaleStatus"
        reason:
          type: string
          example: 商品不想要了
        reject_reason:
          type: string
          nullable: true
          example: null
        refund_amount:
          type: integer
          format: int64
          description: 退款金额，单位分
          example: 599900
        images:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
          example: "2026-07-06T09:30:00+08:00"

    AfterSalePage:
      type: object
      required:
        - list
        - page
        - page_size
        - total
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/AfterSale"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total:
          type: integer
          format: int64
          example: 1

    UploadFile:
      type: object
      required:
        - url
        - filename
        - size
      properties:
        url:
          type: string
          example: https://example.com/uploads/product.jpg
        filename:
          type: string
          example: product.jpg
        size:
          type: integer
          format: int64
          description: 文件大小，单位字节
          example: 102400
