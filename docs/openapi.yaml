openapi: 3.0.3
info:
  title: go-mall API
  version: 0.1.0
  description: |
    go-mall 多商户商城接口文档。旧订单接口继续兼容单商户客户端，新的跨商户结算使用 Trade 接口。

    当前文档作为后端、小程序前端、网页前端共同使用的接口契约。
    金额字段统一使用分，避免浮点数精度问题。
    每个 HTTP 响应都包含 X-Request-ID；客户端应在报错时保留该值用于日志追踪。

    标注为“规划接口，后端尚未实现”的接口用于前端 Mock 和后续后端开发排期。
servers:
  - url: /
    description: current environment
  - url: http://localhost:8080
    description: local
tags:
  - name: Documentation
    description: 接口文档
  - name: Health
    description: 健康检查
  - name: Product
    description: 商品与分类
  - name: Auth
    description: 登录认证
  - name: User
    description: 用户资料与账号能力
  - name: Merchant
    description: 用户端商户信息
  - name: Address
    description: 收货地址
  - name: Favorite
    description: 商品收藏
  - name: Coupon
    description: 优惠券
  - name: Cart
    description: 购物车
  - name: Order
    description: 订单与支付
  - name: Trade
    description: 多商户交易预览、拆单、查询与整笔取消
  - name: Payment
    description: 支付与支付回调
  - name: AfterSale
    description: 售后与退款
  - name: Logistics
    description: 物流信息
  - name: Upload
    description: 文件上传
  - name: MerchantAdmin
    description: 商家后台接口；认证、员工角色、上传、订单、分类、商品、SKU、库存、经营数据和顾客复购分析已实现
  - name: PlatformAdmin
    description: 平台后台，二期规划接口

paths:
  /docs/openapi.yaml:
    get:
      tags:
        - Documentation
      summary: OpenAPI 原始文档
      operationId: getOpenAPIDocument
      responses:
        "200":
          description: OpenAPI YAML 文档
          content:
            application/yaml:
              schema:
                type: string

  /swagger/index.html:
    get:
      tags:
        - Documentation
      summary: Swagger UI 页面
      operationId: getSwaggerUI
      responses:
        "200":
          description: Swagger UI HTML 页面
          content:
            text/html:
              schema:
                type: string

  /health:
    get:
      tags:
        - Health
      summary: 健康检查
      operationId: healthCheck
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/categories:
    get:
      tags:
        - Product
      summary: 商品分类列表
      operationId: listCategories
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/products:
    get:
      tags:
        - Product
      summary: 商品列表
      operationId: listProducts
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 页码
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
          description: 每页数量
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: 分类 ID
        - name: merchant_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
          description: 商户 ID；不传时返回全部启用商户的在售商品
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: 搜索关键词
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProductPage"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/products/{id}:
    get:
      tags:
        - Product
      summary: 商品详情
      operationId: getProductDetail
      parameters:
        - $ref: "#/components/parameters/ProductID"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProductDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/products/{id}/skus:
    get:
      tags:
        - Product
      summary: 商品 SKU 列表
      operationId: listProductSKUs
      parameters:
        - $ref: "#/components/parameters/ProductID"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SKU"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: 账号密码注册
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/RateLimitUnavailable"

  /api/v1/auth/login/password:
    post:
      tags:
        - Auth
      summary: 账号密码登录
      operationId: passwordLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordLoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/RateLimitUnavailable"

  /api/v1/auth/login/wechat:
    post:
      tags:
        - Auth
      summary: 微信小程序 open_id 联调登录（仅本地开发）
      description: 不安全的临时联调接口，仅当 debug 模式且 auth.unsafe_wechat_open_id_login_enabled=true 时注册。生产环境不会注册；正式接入必须由小程序提交 wx.login code，再由服务端调用 code2session。
      deprecated: true
      operationId: wechatMiniProgramLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WechatMiniProgramLoginRequest"
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/RateLimitUnavailable"

  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: 刷新访问令牌
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: 刷新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/RateLimitUnavailable"

  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: 退出登录
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          $ref: "#/components/responses/SuccessEmpty"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me:
    get:
      tags:
        - Auth
      summary: 当前登录用户
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags:
        - User
      summary: 更新当前用户资料
      description: 更新当前登录用户的基础资料。
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/mobile:
    post:
      tags:
        - User
      summary: 绑定或更新手机号
      description: 规划接口，后端尚未实现。第一版可先使用验证码 Mock。
      operationId: bindMobile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindMobileRequest"
      responses:
        "200":
          description: 绑定成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/merchants:
    get:
      tags:
        - Merchant
      summary: 公开商户列表
      description: 已实现。仅返回启用商户，按商户 ID 升序分页。
      operationId: listPublicMerchants
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicMerchantPage"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/merchants/{id}:
    get:
      tags:
        - Merchant
      summary: 商户公开信息
      description: 已实现。停用或不存在的商户统一返回 404。
      operationId: getMerchant
      parameters:
        - $ref: "#/components/parameters/MerchantID"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PublicMerchant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/merchants/{id}/categories:
    get:
      tags:
        - Merchant
      summary: 商户公开分类列表
      description: 已实现。仅返回启用商户的启用分类。
      operationId: listMerchantPublicCategories
      parameters:
        - $ref: "#/components/parameters/MerchantID"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/merchants/{id}/products:
    get:
      tags:
        - Merchant
      summary: 商户商品列表
      description: 已实现。仅返回启用商户的在售商品。
      operationId: listMerchantPublicProducts
      parameters:
        - $ref: "#/components/parameters/MerchantID"
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: category_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProductPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/favorites/products:
    get:
      tags:
        - Favorite
      summary: 收藏商品列表
      description: 已实现。仅返回当前用户收藏且仍在售的商品，按收藏时间倒序分页。
      operationId: listFavoriteProducts
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FavoriteProductPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Favorite
      summary: 收藏商品
      description: 已实现。重复收藏按幂等成功处理，已下架或不存在的商品不能收藏。
      operationId: createFavoriteProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteProductRequest"
      responses:
        "200":
          $ref: "#/components/responses/SuccessEmpty"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/favorites/products/{product_id}:
    delete:
      tags:
        - Favorite
      summary: 取消收藏商品
      description: 已实现。重复取消按幂等成功处理。
      operationId: deleteFavoriteProduct
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductPathID"
      responses:
        "200":
          $ref: "#/components/responses/SuccessEmpty"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/coupons:
    get:
      tags:
        - Coupon
      summary: 可领取优惠券列表
      description: 已实现。返回指定商户当前有效且仍有库存的优惠券，并标识当前用户是否达到领取上限；不传 merchant_id 时兼容默认商户 1。
      operationId: listCoupons
      security:
        - bearerAuth: []
      parameters:
        - name: merchant_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 1
            default: 1
          description: 商户 ID
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Coupon"

  /api/v1/coupons/{id}/claim:
    post:
      tags:
        - Coupon
      summary: 领取优惠券
      description: 已实现。按优惠券所属商户校验商户启用状态，并使用数据库行锁校验发行量和每人限领数量，避免并发超发。
      operationId: claimCoupon
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CouponID"
      responses:
        "200":
          description: 领取成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserCoupon"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/coupons:
    get:
      tags:
        - Coupon
      summary: 我的优惠券
      description: 已实现。支持按未使用、已使用和已过期状态筛选。
      operationId: listMyCoupons
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserCouponStatus"
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/UserCoupon"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/addresses:
    get:
      tags:
        - Address
      summary: 收货地址列表
      operationId: listAddresses
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Address"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Address
      summary: 创建收货地址
      operationId: createAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressRequest"
      responses:
        "200":
          description: 创建成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Address"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/addresses/{id}:
    put:
      tags:
        - Address
      summary: 更新收货地址
      operationId: updateAddress
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Address"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Address
      summary: 删除收货地址
      operationId: deleteAddress
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      responses:
        "200":
          $ref: "#/components/responses/SuccessEmpty"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/addresses/{id}/default:
    put:
      tags:
        - Address
      summary: 设置默认收货地址
      operationId: setDefaultAddress
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AddressID"
      responses:
        "200":
          $ref: "#/components/responses/SuccessEmpty"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/cart/items:
    get:
      tags:
        - Cart
      summary: 购物车列表
      operationId: listCartItems
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 查询成功
          content:
            application/json:
