app:
  # 开发环境可以打开；连接远程或线上 MySQL 时建议保持 false。
  auto_migrate: false
  seed_data: false

server:
  port: 8080
  mode: debug

mysql:
  host: 127.0.0.1
  port: 3306
  user: mall_dev_user
  password: your_password
  database: mall_dev
  charset: utf8mb4
  parse_time: true
  loc: Local

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

log:
  level: debug

jwt:
  access_secret: change_me
  access_ttl_minutes: 120
  refresh_ttl_hours: 168
